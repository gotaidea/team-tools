<title>Dovida Recruitment Territory Map</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Verdana',sans-serif; background:#1a1a1a; color:#fff; height:100vh; display:flex; flex-direction:column; overflow:hidden; }
  #header {
    background:#5f0505; padding:12px 20px; display:flex; align-items:center; gap:16px;
    z-index:1000; box-shadow:0 2px 8px rgba(0,0,0,0.5); flex-shrink:0;
  }
  #header h1 { font-family:'Georgia',serif; font-size:18px; font-weight:bold; color:#fff; letter-spacing:0.5px; }
  #header p { font-size:11px; color:#f7eee9; opacity:0.8; }
  .logo-dot {
    width:36px; height:36px; background:#d73c3c; border-radius:50%; border:2px solid #f7eee9;
    flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:18px;
  }
  #main { display:flex; flex:1; overflow:hidden; }
  #sidebar {
    width:270px; background:#111; overflow-y:auto; border-right:1px solid #2a2a2a; flex-shrink:0;
  }
  #sidebar::-webkit-scrollbar { width:5px; }
  #sidebar::-webkit-scrollbar-track { background:#111; }
  #sidebar::-webkit-scrollbar-thumb { background:#5f0505; border-radius:3px; }
  .sidebar-title { padding:12px 16px 8px; font-size:9px; letter-spacing:2px; text-transform:uppercase; color:#f7eee9; opacity:0.4; border-bottom:1px solid #222; }
  .state-group { border-bottom:1px solid #1e1e1e; }
  .state-label { padding:7px 16px 3px; font-size:9px; letter-spacing:2px; text-transform:uppercase; color:#666; background:#0d0d0d; }
  .office-item {
    padding:7px 14px; cursor:pointer; display:flex; align-items:center; gap:10px;
    border-left:3px solid transparent; transition:background 0.12s;
  }
  .office-item:hover { background:#1a1a1a; }
  .office-item.active { background:#1e1e1e; border-left-color:var(--oc); }
  .office-dot { width:11px; height:11px; border-radius:3px; flex-shrink:0; }
  .office-name { font-size:11px; color:#ccc; line-height:1.3; flex:1; }
  .zone-count { font-size:10px; color:#444; flex-shrink:0; }
  #map { flex:1; height:100%; }
  #info-panel {
    position:absolute; bottom:28px; right:12px;
    background:rgba(15,15,15,0.96); border:1px solid #2a2a2a; border-radius:8px;
    padding:14px 16px; max-width:270px; min-width:200px; z-index:1000;
    display:none; box-shadow:0 4px 24px rgba(0,0,0,0.7);
  }
  #info-panel.visible { display:block; }
  #info-colour-bar { height:3px; border-radius:2px; margin-bottom:10px; }
  #info-office { font-size:13px; font-weight:bold; color:#fff; margin-bottom:3px; font-family:Georgia,serif; line-height:1.3; }
  #info-zone { font-size:10px; color:#888; margin-bottom:8px; min-height:14px; }
  #info-address { font-size:10px; color:#777; border-top:1px solid #222; padding-top:8px; line-height:1.6; }
  #info-address strong { font-size:8px; letter-spacing:1.5px; text-transform:uppercase; color:#d73c3c; display:block; margin-bottom:3px; }
  #reset-btn {
    position:absolute; top:10px; right:12px; z-index:1000;
    background:rgba(15,15,15,0.92); border:1px solid #333; border-radius:5px;
    padding:7px 14px; font-size:11px; color:#bbb; cursor:pointer;
    font-family:Verdana,sans-serif; transition:all 0.15s;
  }
  #reset-btn:hover { background:#1e1e1e; color:#fff; border-color:#555; }
</style>

let map, activeOffice = null;
const polysByOffice = {};
const labelsByOffice = {};
const markersByOffice = {};
const officeZones = {};

ZONES.forEach(z => {
  if (!z.office) return;
  if (!officeZones[z.office]) officeZones[z.office] = [];
  officeZones[z.office].push(z);
});

// Compute polygon centroid
function centroid(coords) {
  let lat = 0, lng = 0;
  coords.forEach(c => { lat += c[0]; lng += c[1]; });
  return { lat: lat / coords.length, lng: lng / coords.length };
}

function initMap() {
  map = new google.maps.Map(document.getElementById('map'), {
    center: { lat: -27, lng: 134 },
    zoom: 4,
    mapTypeId: 'roadmap',
    styles: [
      { elementType:'geometry', stylers:[{ color:'#1c1c2e' }] },
      { elementType:'labels.text.fill', stylers:[{ color:'#8a8aaa' }] },
      { elementType:'labels.text.stroke', stylers:[{ color:'#1c1c2e' }] },
      { featureType:'administrative', elementType:'geometry.stroke', stylers:[{ color:'#3a3a5a' }] },
      { featureType:'administrative.province', elementType:'geometry.stroke', stylers:[{ color:'#4a4a6a', weight:1.5 }] },
      { featureType:'administrative.locality', elementType:'labels.text.fill', stylers:[{ color:'#6a6a8a' }] },
      { featureType:'road', stylers:[{ visibility:'off' }] },
      { featureType:'transit', stylers:[{ visibility:'off' }] },
      { featureType:'poi', stylers:[{ visibility:'off' }] },
      { featureType:'water', elementType:'geometry', stylers:[{ color:'#0a1628' }] },
      { featureType:'water', elementType:'labels.text.fill', stylers:[{ color:'#2a3a4a' }] },
      { featureType:'landscape', elementType:'geometry', stylers:[{ color:'#16162a' }] },
    ],
    mapTypeControl:false, streetViewControl:false, fullscreenControl:true, zoomControl:true,
  });

  Object.keys(OFFICES).forEach(code => drawZones(code, false));
  addMarkers();
  buildSidebar();
  // NO map click listener — only reset button resets view
}

function drawZones(code, highlight) {
  const off = OFFICES[code];
  if (!off) return;
  const zones = officeZones[code] || [];

  // Clear old polygons
  if (polysByOffice[code]) polysByOffice[code].forEach(p => p.setMap(null));
  polysByOffice[code] = [];

  // Clear old labels
  if (labelsByOffice[code]) labelsByOffice[code].forEach(l => l.setMap(null));
  labelsByOffice[code] = [];

  const showLabels = highlight || (!activeOffice && map.getZoom() >= 8);

  zones.forEach(z => {
    if (!z.coords || z.coords.length < 3) return;
    const path = z.coords.map(c => ({ lat: c[0], lng: c[1] }));

    const poly = new google.maps.Polygon({
      paths: path,
      strokeColor: off.color,
      strokeOpacity: highlight ? 1 : 0.7,
      strokeWeight: highlight ? 2 : 1.5,
      fillColor: off.color,
      fillOpacity: highlight ? 0.4 : 0.18,
      map: map,
      zIndex: highlight ? 3 : 1,
    });

    poly.addListener('mouseover', () => {
      poly.setOptions({ fillOpacity: 0.55, strokeOpacity: 1, strokeWeight: 2.5 });
      showInfo(code, z.name);
    });
    poly.addListener('mouseout', () => {
      poly.setOptions({
        fillOpacity: (activeOffice === code) ? 0.4 : 0.18,
        strokeOpacity: (activeOffice === code) ? 1 : 0.7,
        strokeWeight: (activeOffice === code) ? 2 : 1.5,
      });
    });
    poly.addListener('click', e => {
      setActiveOffice(code);
      showInfo(code, z.name);
      google.maps.event.stop(e);
    });

    polysByOffice[code].push(poly);

    // Zone number label
    if (z.label) {
      const c = centroid(z.coords);
      const label = new google.maps.Marker({
        position: c,
        map: map,
        icon: {
          path: google.maps.SymbolPath.CIRCLE,
          scale: 0,
          strokeOpacity: 0,
          fillOpacity: 0,
        },
        label: {
          text: String(z.label),
          color: highlight ? '#ffffff' : 'rgba(255,255,255,0.7)',
          fontSize: highlight ? '11px' : '9px',
          fontWeight: 'bold',
          fontFamily: 'Verdana, sans-serif',
        },
        zIndex: highlight ? 4 : 2,
        clickable: false,
      });
      labelsByOffice[code].push(label);
    }
  });
}

function addMarkers() {
  Object.entries(OFFICES).forEach(([code, off]) => {
    const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="28" height="36" viewBox="0 0 28 36">
      <path d="M14 0C6.27 0 0 6.27 0 14c0 9.75 14 22 14 22S28 23.75 28 14C28 6.27 21.73 0 14 0z"
        fill="${off.color}" stroke="#fff" stroke-width="2"/>
      <circle cx="14" cy="14" r="5" fill="rgba(255,255,255,0.9)"/>
    </svg>`;
    const icon = {
      url: 'data:image/svg+xml;charset=UTF-8,' + encodeURIComponent(svg),
      scaledSize: new google.maps.Size(28, 36),
      anchor: new google.maps.Point(14, 36),
    };
    const marker = new google.maps.Marker({
      position: { lat: off.lat, lng: off.lng },
      map: map, title: off.name, icon: icon, zIndex: 20,
    });
    marker.addListener('click', e => {
      setActiveOffice(code);
      showInfo(code, '');
      zoomToOffice(code);
      google.maps.event.stop(e);
    });
    const iw = new google.maps.InfoWindow({
      content: `<div style="font-family:Verdana,sans-serif;padding:4px;min-width:160px;">
        <div style="font-size:12px;font-weight:bold;color:${off.color};margin-bottom:2px;">${off.name}</div>
        <div style="font-size:10px;color:#555;">${off.address}</div>
      </div>`
    });
    marker.addListener('mouseover', () => iw.open(map, marker));
    marker.addListener('mouseout', () => iw.close());
    markersByOffice[code] = marker;
  });
}

function showInfo(code, zoneName) {
  const off = OFFICES[code];
  if (!off) return;
  document.getElementById('info-colour-bar').style.background = off.color;
  document.getElementById('info-office').textContent = off.name;
  document.getElementById('info-zone').textContent = zoneName || '';
  document.getElementById('info-addr-text').textContent = off.address;
  document.getElementById('info-panel').classList.add('visible');
}

function setActiveOffice(code) {
  activeOffice = code;
  Object.keys(OFFICES).forEach(c => drawZones(c, c === code));
  document.querySelectorAll('.office-item').forEach(el => {
    el.classList.toggle('active', el.dataset.code === code);
  });
}

function zoomToOffice(code) {
  const zones = officeZones[code] || [];
  if (!zones.length) return;
  const bounds = new google.maps.LatLngBounds();
  zones.forEach(z => z.coords.forEach(c => bounds.extend({ lat: c[0], lng: c[1] })));
  map.fitBounds(bounds, { top:60, right:60, bottom:60, left:60 });
}

function resetView() {
  map.setCenter({ lat: -27, lng: 134 });
  map.setZoom(4);
  activeOffice = null;
  Object.keys(OFFICES).forEach(c => drawZones(c, false));
  document.querySelectorAll('.office-item').forEach(el => el.classList.remove('active'));
  document.getElementById('info-panel').classList.remove('visible');
}

function buildSidebar() {
  const list = document.getElementById('office-list');
  Object.entries(STATE_GROUPS).forEach(([state, codes]) => {
    const stateDiv = document.createElement('div');
    stateDiv.className = 'state-group';
    const lbl = document.createElement('div');
    lbl.className = 'state-label';
    lbl.textContent = state;
    stateDiv.appendChild(lbl);
    codes.forEach(code => {
      const off = OFFICES[code];
      if (!off) return;
      const count = (officeZones[code] || []).length;
      const item = document.createElement('div');
      item.className = 'office-item';
      item.dataset.code = code;
      item.style.setProperty('--oc', off.color);
      item.innerHTML = `
        <div class="office-dot" style="background:${off.color}"></div>
        <div class="office-name">${off.name}</div>
        <div class="zone-count">${count}</div>
      `;
      item.onclick = () => {
        setActiveOffice(code);
        showInfo(code, '');
        zoomToOffice(code);
      };
      stateDiv.appendChild(item);
    });
    list.appendChild(stateDiv);
  });
}

// Redraw labels on zoom change
let zoomListener = null;
function setupZoomListener() {
  if (zoomListener) google.maps.event.removeListener(zoomListener);
  zoomListener = map.addListener('zoom_changed', () => {
    if (!activeOffice) {
      Object.keys(OFFICES).forEach(c => drawZones(c, false));
    }
  });
}
</script>

<script async defer src="https://maps.googleapis.com/maps/api/js?key=AIzaSyBjgM2rBWy-8T9_hwXrEcILWlk3q9O6cFI&callback=initMap"></script>
